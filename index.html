// WISPR METHODOLOGY
// ═══════════════════════════════════════════════════════════════
function wisprClean(raw){
  let t=raw.trim();
  t=t.replace(/\b(um+|uh+|hmm+|err+)\b,?\s*/gi,"");
  t=t.replace(/\byou know,?\s*/gi,"");
  t=t.replace(/\bbasically,?\s*/gi,"");
  t=t.replace(/\bliterally,?\s*/gi,"");
  t=t.replace(/.*(?:no wait|wait no|actually no|no actually),\s*/gi,"");
  t=t.replace(/\s{2,}/g," ").trim();
  if(t)t=t.charAt(0).toUpperCase()+t.slice(1);
  if(t&&!/[.!?।]$/.test(t))t+=".";
  return t;
}

// CLAUDE API
// ═══════════════════════════════════════════════════════════════
async function callClaude(system,userMsg,maxTok=900){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTok,system,messages:[{role:"user",content:userMsg}]})
    });
    const d=await r.json();
    return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n")||"[No response]";
  }catch(e){return`[Connection error: ${e.message}]`;}
}

async function runAgent(agentId,userInput,prevOutput="",context=""){
  const a=ALL_AGENTS.find(x=>x.id===agentId);

    ops:`You are ${a.name} — ${a.role} at Global Signal.\n${GS_DNA}\nYOUR SINGLE TASK: ${a.task}\nBe warm, direct, human. Execute your specific task fully.`,
    csuite:a.voice||`You are ${a.name} — ${a.role}. ${GS_DNA}`,
    tech:`You are ${a.name} — ${a.role} at Global Signal.\n${GS_DNA}\nYOUR SINGLE TASK: ${a.task}`,
    finance:`You are ${a.name} — ${a.role} at Global Signal.\n${GS_DNA}\nYOUR SINGLE TASK: ${a.task}`,
    marketing:`You are ${a.name} — ${a.role} at Global Signal.\n${GS_DNA}\nYOUR SINGLE TASK: ${a.task}`,
    legal:`You are ${a.name} — ${a.role} at Global Signal.\n${GS_DNA}\nYOUR SINGLE TASK: ${a.task}`,
  };
  const sys=sysByDept[a.dept]||sysByDept.content;

// PIPELINE RUNNER
// ═══════════════════════════════════════════════════════════════
function PipelineRunner({pipeline,onBack}){
  const[input,setInput]=useState("");
  const[running,setRunning]=useState(false);
  const[done,setDone]=useState(false);
  const[activeStep,setActiveStep]=useState(null);
  const[outputs,setOutputs]=useState({});
  const[completed,setCompleted]=useState([]);
  const scrollRef=useRef();
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[activeStep,completed]);
  const run=useCallback(async()=>{
    if(!input.trim()||running)return;
    setRunning(true);setDone(false);setOutputs({});setCompleted([]);
    let prev="";
    for(const id of pipeline.steps){
      setActiveStep(id);
      await new Promise(r=>setTimeout(r,300));
      const out=await runAgent(id,input,prev,pipeline.name);
      prev=out;
      setOutputs(p=>({...p,[id]:out}));
      setCompleted(p=>[...p,id]);
      setActiveStep(null);
      await new Promise(r=>setTimeout(r,200));
    }
    setRunning(false);setDone(true);
  },[input,running,pipeline]);
  const finalOut=outputs[pipeline.steps[pipeline.steps.length-1]]||"";
  return(<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <div style={{padding:"14px 22px",borderBottom:`1px solid ${C.edge}`,background:C.base,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${C.edge}`,color:C.t2,borderRadius:7,padding:"5px 12px",fontSize:10,cursor:"pointer",fontFamily:"monospace"}}>← BACK</button>
      <div style={{width:32,height:32,borderRadius:8,background:pipeline.color+"18",border:`1px solid ${pipeline.color}35`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:pipeline.color,flexShrink:0}}>{pipeline.icon}</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:14,color:C.t0,fontFamily:"monospace"}}>{pipeline.name}</div>
        <div style={{fontSize:10,color:C.t2}}>{pipeline.steps.length} agents working in sequence</div>
      </div>
      <div style={{display:"flex",gap:4}}>
        {pipeline.steps.map(id=>{const a=ALL_AGENTS.find(x=>x.id===id);return<Av key={id} agent={a} size={26} active={activeStep===id}/>;} )}
      </div>
    </div>
    <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"18px 24px"}}>
      {!running&&!done&&(<div style={{background:C.card,border:`1px solid ${pipeline.color}25`,borderRadius:12,padding:24,marginBottom:16}}>
        <div style={{fontSize:9,color:pipeline.color,fontFamily:"monospace",letterSpacing:".14em",marginBottom:10}}>{pipeline.inputLabel?.toUpperCase()}</div>
        <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder={pipeline.placeholder} rows={7}
          style={{width:"100%",background:C.deep,border:`1px solid ${C.line}`,borderRadius:8,color:C.t0,fontSize:13,padding:"12px 14px",fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
        <button onClick={run} disabled={!input.trim()}
          style={{marginTop:14,background:input.trim()?pipeline.color:C.edge,color:C.void,border:"none",borderRadius:8,padding:"11px 28px",fontSize:12,fontWeight:900,cursor:input.trim()?"pointer":"not-allowed",fontFamily:"monospace"}}>
          ▶ RUN {pipeline.name.toUpperCase()}
        </button>
      </div>)}
      {(running||done)&&(<div>
        <div style={{marginBottom:14,padding:"12px 16px",background:pipeline.color+"08",border:`1px solid ${pipeline.color}25`,borderRadius:9}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
            <span style={{fontSize:10,color:pipeline.color,fontFamily:"monospace",fontWeight:800}}>
              {done?"✓ PIPELINE COMPLETE":activeStep?`${ALL_AGENTS.find(x=>x.id===activeStep)?.name} is working…`:"Starting…"}
            </span>
            <span style={{fontSize:10,color:C.t2,fontFamily:"monospace"}}>{completed.length}/{pipeline.steps.length} agents done</span>
          </div>
          <div style={{height:4,background:C.edge,borderRadius:2}}>
            <div style={{height:"100%",width:`${(completed.length/pipeline.steps.length)*100}%`,background:pipeline.color,borderRadius:2,transition:"width .4s"}}/>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {pipeline.steps.map(id=><StepCard key={id} agentId={id} output={outputs[id]} stepLabel={pipeline.stepLabel?.[id]||"Processing…"} isActive={activeStep===id} isDone={completed.includes(id)}/>)}
        </div>
        {done&&finalOut&&(<div style={{marginTop:18,background:C.card,border:`2px solid ${pipeline.color}40`,borderRadius:12,padding:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <Dot c={pipeline.color} s={7}/>
            <span style={{fontSize:10,fontWeight:800,color:pipeline.color,fontFamily:"monospace"}}>FINAL OUTPUT — {pipeline.name.toUpperCase()}</span>
          </div>
          <div style={{background:C.deep,border:`1px solid ${pipeline.color}20`,borderRadius:8,padding:16,fontSize:13,color:C.t0,lineHeight:1.9,whiteSpace:"pre-wrap",maxHeight:480,overflowY:"auto",fontFamily:"monospace"}}>{finalOut}</div>
          <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
            <button onClick={()=>navigator.clipboard?.writeText(finalOut)} style={{background:"transparent",border:`1px solid ${pipeline.color}50`,color:pipeline.color,borderRadius:7,padding:"7px 16px",fontSize:10,cursor:"pointer",fontFamily:"monospace",fontWeight:700}}>⎘ COPY FINAL OUTPUT</button>
            <button onClick={()=>{setInput("");setOutputs({});setCompleted([]);setDone(false);}} style={{background:"transparent",border:`1px solid ${C.edge}`,color:C.t2,borderRadius:7,padding:"7px 16px",fontSize:10,cursor:"pointer",fontFamily:"monospace"}}>⟳ RUN AGAIN</button>
          </div>
        </div>)}
      </div>)}
    </div>
  </div>);
}

                {post.status==="pending"&&rejectMode&&(<div style={{background:C.rose+"08",border:`1px solid ${C.rose}25`,borderRadius:10,padding:"16px 18px"}}>
                  <div style={{fontSize:10,color:C.rose,fontFamily:"monospace",marginBottom:8}}>What should the agents fix?</div>
                  <textarea value={rejectReason} onChange={e=>setRejectReason(e.target.value)} placeholder="e.g. Make it more personal, mention my Gujarat roots... or Add something about Matri Doodh... or The tone feels too formal..." rows={3} style={{width:"100%",background:C.deep,border:`1px solid ${C.line}`,borderRadius:7,color:C.t0,fontSize:12,padding:"10px 12px",fontFamily:"inherit",resize:"none",outline:"none",boxSizing:"border-box"}}/>
                  <div style={{display:"flex",gap:10,marginTop:10}}>
                    <button onClick={()=>{rejectPost(post.id,rejectReason);setRejectMode(false);setRejectReason("");}} style={{flex:1,background:C.rose,color:"#fff",border:"none",borderRadius:7,padding:"9px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"monospace"}}>↺ REJECT & REGENERATE</button>
                    <button onClick={()=>setRejectMode(false)} style={{background:"transparent",border:`1px solid ${C.edge}`,color:C.t3,borderRadius:7,padding:"9px 16px",fontSize:11,cursor:"pointer",fontFamily:"monospace"}}>CANCEL</button>
                  </div>
                </div>)}
                {post.status==="approved"&&(<div style={{background:C.jade+"08",border:`1px solid ${C.jade}25`,borderRadius:10,padding:"14px 16px"}}>
                  <div style={{fontSize:11,color:C.jade,fontWeight:700,marginBottom:8}}>✓ APPROVED — How to publish</div>
                  <div style={{fontSize:11,color:C.t1,lineHeight:1.8,marginBottom:12}}>1. Copy the post above → 2. Open LinkedIn → 3. Start a Post → 4. Paste & Publish at <strong style={{color:C.gold}}>{post.scheduledDay} · {post.scheduledTime} IST</strong></div>
                  <button onClick={()=>navigator.clipboard?.writeText(post.text)} style={{background:C.jade,color:C.void,border:"none",borderRadius:7,padding:"8px 18px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"monospace"}}>⎘ COPY NOW & POST</button>
                </div>)}
              </div>)}
            </div>);
          })}
        </div>
      </div>)}

      {/* TEAM */}
      {nav==="team"&&(<div style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:8,color:C.signal,fontFamily:"monospace",letterSpacing:".2em",marginBottom:4}}>GLOBAL SIGNAL TEAM DIRECTORY</div>
          <h2 style={{fontSize:22,fontWeight:900,color:C.t0,fontFamily:"monospace",marginBottom:6}}>74 Agents · 7 Departments</h2>
          <div style={{fontSize:12,color:C.t2}}>Every agent has one job. One task. Perfect execution.</div>
        </div>
        {/* Dept filter */}
        <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:18,paddingBottom:4}}>
          {DEPTS.map(d=>(<button key={d.id} onClick={()=>setTeamFilter(d.id)} style={{padding:"5px 14px",background:teamFilter===d.id?d.color:"transparent",color:teamFilter===d.id?C.void:d.color,border:`1px solid ${teamFilter===d.id?d.color:d.color+"40"}`,borderRadius:20,fontSize:9,cursor:"pointer",fontFamily:"monospace",fontWeight:800,whiteSpace:"nowrap",transition:"all .15s"}}>{d.label}</button>))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {visibleAgents.map(a=>(<div key={a.id} style={{background:C.card,border:`1px solid ${a.color}18`,borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:12}}>
            <Av agent={a} size={40}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:3}}>
                <span style={{fontWeight:800,fontSize:13,color:C.t0}}>{a.name}</span>
                <Tag c={a.color} xs>{a.role}</Tag>
                {a.dept!=="csuite"&&<Tag c={C.t3} xs>{a.dept}</Tag>}
              </div>
              <div style={{fontSize:10,color:C.t2,lineHeight:1.5}}>{a.task}</div>
            </div>
          </div>))}
        </div>
      </div>)}

      {/* YC INTEL */}
      {nav==="ycintel"&&(<div style={{display:"flex",height:"100%",overflow:"hidden"}}>
        {/* YC sidebar */}
        <div style={{width:180,background:C.base,borderRight:`1px solid ${C.edge}`,display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"12px 12px 8px",borderBottom:`1px solid ${C.edge}`}}>
            <div style={{fontSize:10,fontWeight:800,color:C.amber,fontFamily:"monospace",marginBottom:4}}>🔶 YC INTEL</div>
            <div style={{fontSize:8,color:C.t3,lineHeight:1.5}}>5,690+ companies<br/>Live from yc-oss/api</div>
          </div>
          <div style={{flex:1,padding:"8px",overflowY:"auto"}}>
            {[{id:"top",l:"⭐ Top Companies"},{id:"ai",l:"🤖 AI Companies"},{id:"health",l:"🏥 Healthcare"},{id:"hiring",l:"🟢 Now Hiring"},{id:"india",l:"🇮🇳 India Focus"}].map(f=>(<button key={f.id} onClick={()=>loadYC(f.id)} style={{display:"block",width:"100%",marginBottom:5,padding:"8px 10px",background:ycFilter===f.id?C.amber:C.card,color:ycFilter===f.id?C.void:C.t1,border:`1px solid ${ycFilter===f.id?C.amber:C.edge}`,borderRadius:7,fontSize:10,cursor:"pointer",textAlign:"left",fontFamily:"monospace",transition:"all .15s"}}>
              {f.l}{ycLoading&&ycFilter===f.id&&<span style={{marginLeft:6,display:"inline-block",width:9,height:9,border:"2px solid transparent",borderTopColor:C.void,borderRadius:"50%",animation:"spin .7s linear infinite"}}/>}
            </button>))}
          </div>
          <div style={{padding:"8px 12px",borderTop:`1px solid ${C.edge}`,fontSize:8,color:C.t4,fontFamily:"monospace",lineHeight:1.5}}>
            Click filter → Browse results<br/>Or use AI Research chat →
          </div>
        </div>
        {/* YC main */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Search + tabs */}
          <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.edge}`,background:C.base,display:"flex",gap:10,alignItems:"center"}}>
            <input value={ycSearch} onChange={e=>setYcSearch(e.target.value)} placeholder={`Search ${ycData.length} loaded companies…`} style={{flex:1,background:C.card,border:`1px solid ${C.line}`,borderRadius:8,color:C.t0,fontSize:12,padding:"8px 12px",fontFamily:"inherit",outline:"none"}}/>
            <div style={{fontSize:10,color:C.t3,fontFamily:"monospace",whiteSpace:"nowrap"}}>{filteredYC.length} results</div>
          </div>
          <div style={{flex:1,display:"flex",overflow:"hidden"}}>
            {/* Company list */}
            <div style={{flex:1,overflowY:"auto",padding:"14px 16px"}}>
              {ycData.length===0&&!ycLoading&&(<div style={{textAlign:"center",padding:"40px 0",color:C.t3,fontSize:12}}>Select a filter on the left to load YC companies.</div>)}
              {ycLoading&&(<div style={{textAlign:"center",padding:"40px"}}>
                <div style={{display:"inline-block",width:20,height:20,border:`3px solid ${C.edge}`,borderTopColor:C.amber,borderRadius:"50%",animation:"spin .7s linear infinite",marginBottom:12}}/>
                <div style={{color:C.t3,fontSize:11}}>Loading from YC API…</div>
              </div>)}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {filteredYC.slice(0,60).map((c,i)=>(<div key={i} style={{background:C.card,border:`1px solid ${C.edge}`,borderRadius:9,padding:"12px 14px",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=C.amber;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.edge;}}>
                  <div style={{fontWeight:800,fontSize:12,color:C.t0,marginBottom:2}}>{c.name}</div>
                  <div style={{fontSize:8,color:C.amber,fontFamily:"monospace",marginBottom:5}}>{c.batch} · {c.status}{c.isHiring?" · 🟢 HIRING":""}</div>
                  <div style={{fontSize:10,color:C.t2,lineHeight:1.5,marginBottom:6}}>{c.one_liner?.slice(0,70)}</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {(c.tags||[]).slice(0,3).map(t=><Tag key={t} c={C.amber} xs>{t}</Tag>)}
                  </div>
                </div>))}
              </div>
            </div>
            {/* YC AI chat */}
            <div style={{width:320,borderLeft:`1px solid ${C.edge}`,display:"flex",flexDirection:"column",flexShrink:0}}>
              <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.edge}`,background:C.base}}>
                <div style={{fontSize:9,color:C.amber,fontFamily:"monospace",fontWeight:800}}>🔶 AI RESEARCH CHAT</div>
                <div style={{fontSize:9,color:C.t3,marginTop:2}}>Ask Brij to analyse YC data for Global Signal</div>
              </div>
              <div ref={ycScrollRef} style={{flex:1,overflowY:"auto",padding:"14px 14px"}}>
                {ycChatMsgs.length===0&&(<div style={{color:C.t3,fontSize:11,textAlign:"center",padding:"20px 0",lineHeight:1.8}}>
                  Ask things like:<br/>
                  <span style={{color:C.amber,fontSize:10}}>"Find healthcare AI companies we can partner with"</span><br/>
                  <span style={{color:C.amber,fontSize:10}}>"Which YC founders invest in India healthtech?"</span>
                </div>)}
                {ycChatMsgs.map((m,i)=>{
                  const isUser=m.from==="user";
                  return(<div key={i} style={{display:"flex",flexDirection:"column",alignItems:isUser?"flex-end":"flex-start",marginBottom:12}}>
                    <div style={{maxWidth:"90%",background:isUser?C.gold+"09":C.amber+"09",border:`1px solid ${isUser?C.gold:C.amber}20`,borderRadius:isUser?"10px 2px 10px 10px":"2px 10px 10px 10px",padding:"10px 13px",fontSize:12,color:C.t0,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{m.text}</div>
                  </div>);
                })}
                {ycLoading2&&(<div style={{display:"flex",gap:4,padding:"6px 0"}}>{[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:C.amber,animation:`glow ${.4+i*.13}s ease-in-out infinite alternate`}}/>)}<span style={{fontSize:10,color:C.amber,marginLeft:6}}>Analysing…</span></div>)}
              </div>
              <div style={{borderTop:`1px solid ${C.edge}`,padding:"10px 12px"}}>
                <div style={{display:"flex",gap:8}}>
                  <input value={ycInput} onChange={e=>setYcInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendYCChat();}} placeholder="Ask about YC companies…" style={{flex:1,background:C.card,border:`1px solid ${C.line}`,borderRadius:8,color:C.t0,fontSize:11,padding:"8px 10px",fontFamily:"inherit",outline:"none"}}/>
                  <button onClick={sendYCChat} disabled={!ycInput.trim()||ycLoading2} style={{width:36,height:36,background:!ycInput.trim()||ycLoading2?C.edge:C.amber,color:C.void,border:"none",borderRadius:8,fontSize:16,cursor:!ycInput.trim()||ycLoading2?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {ycLoading2?<span style={{width:12,height:12,border:"2px solid transparent",borderTopColor:C.void,borderRadius:"50%",animation:"spin .7s linear infinite"}}/>:"↑"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>)}

    </main>
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
